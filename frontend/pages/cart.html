<!doctype html>
<html lang="vi">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="../assets/css/style.css">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <title>Giỏ hàng của bạn</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f3f4f6;
      color: #111827;
    }

    .container {
      max-width: 1000px;
      margin: 40px auto;
      background: #fff;
      padding: 24px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
      border-radius: 10px;
      min-height: 400px;
    }

    h1 {
      margin-top: 0;
      font-size: 28px;
      color: #2563eb;
    }

    .cart-table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
    }

    .cart-table th,
    .cart-table td {
      padding: 16px;
      border-bottom: 1px solid #e5e7eb;
      text-align: left;
    }

    .cart-table th {
      background: #f9fafb;
      font-weight: 700;
      color: #6b7280;
    }

    .item-name {
      font-weight: 600;
      font-size: 16px;
    }

    .item-category {
      font-size: 13px;
      color: #6b7280;
      margin-top: 4px;
    }

    .total-row {
      text-align: right;
      font-size: 24px;
      font-weight: 800;
      color: #dc2626;
      margin-top: 24px;
      padding-top: 24px;
      border-top: 2px solid #e5e7eb;
    }

    .actions {
      margin-top: 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .btn {
      padding: 14px 24px;
      border: none;
      border-radius: 8px;
      font-weight: 700;
      font-size: 16px;
      cursor: pointer;
      transition: 0.2s;
    }

    .btn-clear {
      background: #f3f4f6;
      color: #4b5563;
    }

    .btn-clear:hover {
      background: #e5e7eb;
    }

    .btn-checkout {
      background: #dc2626;
      color: white;
    }

    .btn-checkout:hover {
      background: #b91c1c;
    }

    .empty-cart {
      text-align: center;
      padding: 60px 20px;
      color: #6b7280;
    }

    .empty-cart i {
      font-size: 48px;
      margin-bottom: 16px;
      color: #d1d5db;
    }
  </style>
</head>

<body>
  <div id="header"></div>

  <div class="container">
    <h1><i class="fa-solid fa-cart-shopping"></i> GIỎ HÀNG CỦA BẠN</h1>

    <div id="cartContent">
    </div>

  </div>

  <div id="footer"></div>

  <script src="../components/header.js"></script>
  <script src="../components/footer.js"></script>

  <script>
    renderHeader("header");
    renderFooter("footer");

    const PARTS = {
      cpu: "Bộ vi xử lý", main: "Bo mạch chủ", ram: "RAM", ssd: "SSD",
      hdd: "HDD", vga: "VGA", psu: "Nguồn", case: "Vỏ case",
      monitor: "Màn hình", keyboard: "Bàn phím", mouse: "Chuột",
      headset: "Tai nghe", fan: "Fan case", aircool: "Tản nhiệt khí",
      aio: "Tản nhiệt nước AIO", custom: "Tản nhiệt nước Custom", windows: "Windows"
    };

    function loadCart() {
      const cartContent = document.getElementById("cartContent");

      let buildCart = JSON.parse(localStorage.getItem("pc_build")) || {};

      let regularCart = JSON.parse(localStorage.getItem("cart")) || [];

      let regularItems = Array.isArray(regularCart) ? regularCart : Object.values(regularCart);


      const hasBuildItems = Object.keys(buildCart).length > 0;
      const hasRegularItems = regularItems.length > 0;

      if (!hasBuildItems && !hasRegularItems) {
        cartContent.innerHTML = `
          <div class="empty-cart">
            <i class="fa-solid fa-cart-arrow-down"></i>
            <h2>Giỏ hàng đang trống</h2>
            <p>Bạn chưa có sản phẩm nào trong giỏ hàng. Hãy quay lại cửa hàng để mua sắm nhé!</p>
            <a href="index.html" class="btn btn-checkout" style="display:inline-block; margin-top:16px; text-decoration:none;">Quay lại Trang chủ</a>
          </div>
        `;
        return;
      }

      let html = `
        <table class="cart-table">
          <thead>
            <tr>
              <th>Sản phẩm</th>
              <th style="text-align: center;">Số lượng</th>
              <th style="text-align: right;">Đơn giá</th>
              <th style="text-align: right;">Thành tiền</th>
            </tr>
          </thead>
          <tbody>
      `;

      let totalAmount = 0;


      for (const key in buildCart) {
        const item = buildCart[key];
        const qty = Number(item.qty || 1);
        const price = Number(item.price || 0);
        const lineTotal = price * qty;
        totalAmount += lineTotal;

        const categoryName = PARTS[key] || "Linh kiện PC";

        html += `
          <tr>
            <td>
              <div class="item-name">${item.name}</div>
              <div class="item-category">${categoryName} (Từ cấu hình ráp máy)</div>
            </td>
            <td style="text-align: center;">${qty}</td>
            <td style="text-align: right;">${price.toLocaleString("vi-VN")} đ</td>
            <td style="text-align: right; font-weight: bold; color: #dc2626;">${lineTotal.toLocaleString("vi-VN")} đ</td>
          </tr>
        `;
      }


      regularItems.forEach(item => {
        const qty = Number(item.qty || item.quantity || 1);
        const price = Number(item.price || 0);
        const lineTotal = price * qty;
        totalAmount += lineTotal;

        html += `
          <tr>
            <td>
              <div class="item-name">${item.name || 'Sản phẩm'}</div>
              <div class="item-category">Mua lẻ</div>
            </td>
            <td style="text-align: center;">${qty}</td>
            <td style="text-align: right;">${price.toLocaleString("vi-VN")} đ</td>
            <td style="text-align: right; font-weight: bold; color: #dc2626;">${lineTotal.toLocaleString("vi-VN")} đ</td>
          </tr>
        `;
      });

      html += `
          </tbody>
        </table>
        
        <div class="total-row">
          TỔNG THANH TOÁN: ${totalAmount.toLocaleString("vi-VN")} đ
        </div>

        <div class="actions">
          <button class="btn btn-clear" onclick="clearCart()">
            <i class="fa-solid fa-trash"></i> Xóa giỏ hàng
          </button>
          <button class="btn btn-checkout" onclick="checkout()">
            Tiến hành Đặt hàng <i class="fa-solid fa-arrow-right"></i>
          </button>
        </div>
      `;

      cartContent.innerHTML = html;
    }

    function clearCart() {

      if (confirm(
        "Bạn có chắc chắn muốn xóa?"
      )) {

        localStorage.removeItem(
          "pc_build"
        );

        localStorage.removeItem(
          "cart"
        );

        localStorage.removeItem(
          "cartItems"
        );

        loadCart();

        updateCartCount();

        renderHeader("header");

      }

    }

    function checkout() {
      alert("Cảm ơn bạn đã đặt hàng! Tính năng thanh toán đang được phát triển.");
      localStorage.removeItem("pc_build");
      localStorage.removeItem("cart");

      // SỬA ĐƯỜNG DẪN TRANG CHỦ
      window.location.href = "index.html";
    }

    // Chạy hàm loadCart ngay khi mở trang
    loadCart();
  </script>
</body>

</html>
