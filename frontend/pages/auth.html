<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập / Đăng ký | EIU COMPUTER</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --primary: #e11d48;
            --primary-hover: #be123c;
            --text-main: #111827;
            --text-muted: #6b7280;
            --bg-page: #f3f4f6;
            --border: #e5e7eb;
        }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-main);
        }

        .auth-container {
            width: 100%;
            max-width: 480px;
            padding: 20px;
        }

        .logo-area {
            text-align: center;
            margin-bottom: 24px;
        }

        .logo-area a {
            font-size: 32px;
            font-weight: 800;
            color: var(--primary);
            text-decoration: none;
            letter-spacing: -1px;
        }

        .auth-card {
            background: #fff;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.08);
            overflow: hidden;
        }

        /* Tabs */
        .auth-tabs {
            display: flex;
            border-bottom: 1px solid var(--border);
        }

        .tab-btn {
            flex: 1;
            padding: 18px 0;
            text-align: center;
            font-size: 16px;
            font-weight: 600;
            color: var(--text-muted);
            background: #f9fafb;
            border: none;
            cursor: pointer;
            transition: 0.3s;
            position: relative;
        }

        .tab-btn.active {
            color: var(--primary);
            background: #fff;
        }

        .tab-btn.active::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 0;
            width: 100%;
            height: 3px;
            background: var(--primary);
        }

        /* Forms */
        .auth-forms {
            padding: 32px 40px;
        }

        .form-pane {
            display: none;
            animation: fadeIn 0.4s ease;
        }

        .form-pane.active {
            display: block;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 8px;
            color: #374151;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #9ca3af;
        }

        .form-control {
            width: 100%;
            padding: 14px 16px 14px 44px;
            border: 1px solid #d1d5db;
            border-radius: 10px;
            font-size: 15px;
            font-family: inherit;
            transition: 0.3s;
            box-sizing: border-box;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(225, 29, 72, 0.1);
        }

        /* Utils */
        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
            margin-bottom: 24px;
        }

        .forgot-link {
            color: var(--primary);
            text-decoration: none;
            font-weight: 500;
        }

        .forgot-link:hover {
            text-decoration: underline;
        }

        /* Buttons */
        .btn-submit {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-submit:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
        }

        /* Social Login */
        .social-divider {
            text-align: center;
            margin: 24px 0;
            position: relative;
        }

        .social-divider::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            width: 100%;
            height: 1px;
            background: var(--border);
            z-index: 1;
        }

        .social-divider span {
            position: relative;
            background: #fff;
            padding: 0 16px;
            color: var(--text-muted);
            font-size: 14px;
            z-index: 2;
        }

        .social-logins {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .btn-social {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 10px;
            background: #fff;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: 0.3s;
            color: var(--text-main);
        }

        .btn-social:hover {
            background: #f9fafb;
            border-color: #d1d5db;
        }

        .btn-social.google { color: #ea4335; }
        .btn-social.facebook { color: #1877f2; }

        .back-home {
            display: block;
            text-align: center;
            margin-top: 24px;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
        }

        .back-home:hover {
            color: var(--primary);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 480px) {
            .auth-forms { padding: 24px; }
            .social-logins { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div class="auth-container">
        <div class="logo-area">
            <a href="index.html">EIU COMPUTER</a>
        </div>

        <div class="auth-card">
            <div class="auth-tabs">
                <button class="tab-btn active" onclick="switchTab('login')">Đăng nhập</button>
                <button class="tab-btn" onclick="switchTab('register')">Đăng ký</button>
            </div>

            <div class="auth-forms">
                <form id="loginForm" class="form-pane active" onsubmit="handleLogin(event)">
                    <div class="form-group">
                        <label>Email của bạn</label>
                        <div class="input-wrapper">
                            <i class="fa-regular fa-envelope"></i>
                            <input type="email" id="loginEmail" class="form-control" placeholder="Nhập email" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Mật khẩu</label>
                        <div class="input-wrapper">
                            <i class="fa-solid fa-lock"></i>
                            <input type="password" id="loginPassword" class="form-control" placeholder="Nhập mật khẩu" required>
                        </div>
                    </div>

                    <div class="form-options">
                        <label style="display: flex; align-items: center; gap: 8px; cursor: pointer; margin: 0; font-weight: normal;">
                            <input type="checkbox"> Nhớ mật khẩu
                        </label>
                        <a href="#" class="forgot-link">Quên mật khẩu?</a>
                    </div>

                    <button type="submit" class="btn-submit">Đăng nhập</button>
                </form>

                <form id="registerForm" class="form-pane" onsubmit="handleRegister(event)">
                    <div class="form-group">
                        <label>Họ và Tên</label>
                        <div class="input-wrapper">
                            <i class="fa-regular fa-user"></i>
                            <input type="text" class="form-control" id="regName" placeholder="Nhập họ tên đầy đủ" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Số điện thoại</label>
                        <div class="input-wrapper">
                            <i class="fa-solid fa-phone"></i>
                            <input type="tel" class="form-control" id="regPhone" placeholder="Nhập số điện thoại" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Địa chỉ</label>
                        <div class="input-wrapper">
                            <i class="fa-solid fa-location-dot"></i>
                            <input type="text" class="form-control" id="regAddress" placeholder="Nhập địa chỉ giao hàng" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <div class="input-wrapper">
                            <i class="fa-regular fa-envelope"></i>
                            <input type="email" class="form-control" id="regEmail" placeholder="Nhập email" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Mật khẩu</label>
                        <div class="input-wrapper">
                            <i class="fa-solid fa-lock"></i>
                            <input type="password" id="regPass" class="form-control" placeholder="Tạo mật khẩu (ít nhất 6 ký tự)" minlength="6" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Xác nhận mật khẩu</label>
                        <div class="input-wrapper">
                            <i class="fa-solid fa-shield-check"></i>
                            <input type="password" id="regPassConfirm" class="form-control" placeholder="Nhập lại mật khẩu" required>
                        </div>
                    </div>

                    <button type="submit" class="btn-submit">Đăng ký tài khoản</button>
                </form>

                <div class="social-divider">
                    <span>Hoặc đăng nhập bằng</span>
                </div>
                <div class="social-logins">
                    <button class="btn-social google">
                        <i class="fa-brands fa-google"></i> Google
                    </button>
                    <button class="btn-social facebook">
                        <i class="fa-brands fa-facebook-f"></i> Facebook
                    </button>
                </div>
            </div>
        </div>

        <a href="index.html" class="back-home"><i class="fa-solid fa-arrow-left"></i> Quay lại Trang chủ</a>
    </div>

    <script>
        // ==========================================
        // CỖ MÁY TẠO THÔNG BÁO XỊN SÒ (TOAST)
        // ==========================================
        function showToast(message, type = 'success') {
            let toastContainer = document.getElementById('toast-container');
            if (!toastContainer) {
                toastContainer = document.createElement('div');
                toastContainer.id = 'toast-container';
                toastContainer.style.cssText = 'position: fixed; top: 20px; right: 20px; z-index: 9999; display: flex; flex-direction: column; gap: 10px;';
                document.body.appendChild(toastContainer);
            }

            const toast = document.createElement('div');
            // Nếu type là error thì đổ màu đỏ, còn lại xanh
            const bgColor = type === 'error' ? '#ef4444' : '#10b981'; 
            const icon = type === 'error' ? '<i class="fa-solid fa-circle-exclamation"></i>' : '<i class="fa-solid fa-circle-check"></i>';

            toast.style.cssText = `
                background: ${bgColor};
                color: white;
                padding: 16px 24px;
                border-radius: 8px;
                font-family: 'Inter', sans-serif;
                font-size: 15px;
                font-weight: 500;
                box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
                display: flex;
                align-items: center;
                gap: 12px;
                transform: translateX(120%);
                transition: transform 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            `;

            toast.innerHTML = `${icon} <span>${message}</span>`;
            toastContainer.appendChild(toast);

            // Hiệu ứng trượt vào
            setTimeout(() => { toast.style.transform = 'translateX(0)'; }, 10);

            // Tự động biến mất sau 3 giây
            setTimeout(() => {
                toast.style.transform = 'translateX(120%)';
                setTimeout(() => toast.remove(), 400);
            }, 3000);
        }

        function switchTab(tabName) {
            // 1. Tắt màu đỏ ở tất cả các nút
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            
            // 2. Bật màu đỏ cho đúng nút cần thiết
            if (tabName === 'login') {
                document.querySelectorAll('.tab-btn')[0].classList.add('active');
            } else if (tabName === 'register') {
                document.querySelectorAll('.tab-btn')[1].classList.add('active');
            }

            // 3. Đổi form hiển thị
            document.querySelectorAll('.form-pane').forEach(form => {
                form.classList.remove('active');
            });
            document.getElementById(tabName + 'Form').classList.add('active');
        }

        // KẾT NỐI API ĐĂNG NHẬP THẬT
        async function handleLogin(e) {
            e.preventDefault(); 
            
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;

            try {
                const res = await fetch('http://localhost:3000/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await res.json();

                if (res.ok) {
                    showToast('Đăng nhập thành công! Chào mừng ' + data.user.name, 'success');
                    
                    // Lưu JWT Token và User Info vào LocalStorage
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));

                    // Phân quyền chuyển trang (Sau 1s để kịp xem thông báo)
                    setTimeout(() => {
                        if (data.user.role === 'admin') {
                            window.location.href = 'admin.html'; 
                        } else {
                            window.location.href = 'account.html'; 
                        }
                    }, 1000);
                } else {
                    showToast('Lỗi: ' + data.message, 'error'); // Truyền 'error' vào đây để nó đỏ
                }
            } catch (error) {
                console.error("Lỗi:", error);
                showToast('Lỗi kết nối đến máy chủ Backend!', 'error'); // Và đây nữa
            }
        }

        // KẾT NỐI API ĐĂNG KÝ THẬT (Đã bế thêm SĐT và Địa chỉ)
        async function handleRegister(e) {
            e.preventDefault();

            const name = document.getElementById('regName').value;
            const phone = document.getElementById('regPhone').value;
            const address = document.getElementById('regAddress').value;
            const email = document.getElementById('regEmail').value;
            const pass = document.getElementById('regPass').value;
            const confirmPass = document.getElementById('regPassConfirm').value;

            if(pass !== confirmPass) {
                showToast('Mật khẩu xác nhận không khớp. Vui lòng kiểm tra lại!', 'error'); // Chỗ này nữa
                return;
            }

            try {
                const res = await fetch('http://localhost:3000/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    // Nhét thêm phone với address vào giỏ hàng gửi đi
                    body: JSON.stringify({ 
                        full_name: name, 
                        email: email, 
                        password: pass,
                        phone: phone,
                        address: address
                    })
                });

                const data = await res.json();

                if (res.ok) {
                    showToast(data.message, 'success'); 
                    switchTab('login');
                    document.getElementById('registerForm').reset();
                } else {
                    showToast('Lỗi: ' + data.message, 'error'); // Đỏ lòm đây
                }
            } catch (error) {
                console.error("Lỗi:", error);
                showToast('Lỗi kết nối đến máy chủ Backend!', 'error'); // Cả đây nữa
            }
        }
    </script>
</body>
</html>
