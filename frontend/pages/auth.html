<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập / Đăng ký | EIU COMPUTER</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --primary: #e11d48;
            --primary-hover: #be123c;
            --text-main: #111827;
            --text-muted: #6b7280;
            --bg-page: #f3f4f6;
            --border: #e5e7eb;
        }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-main);
        }

        .auth-container {
            width: 100%;
            max-width: 480px;
            padding: 20px;
        }

        .logo-area {
            text-align: center;
            margin-bottom: 24px;
        }

        .logo-area a {
            font-size: 32px;
            font-weight: 800;
            color: var(--primary);
            text-decoration: none;
            letter-spacing: -1px;
        }

        .auth-card {
            background: #fff;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.08);
            overflow: hidden;
        }

        /* Tabs */
        .auth-tabs {
            display: flex;
            border-bottom: 1px solid var(--border);
        }

        .tab-btn {
            flex: 1;
            padding: 18px 0;
            text-align: center;
            font-size: 16px;
            font-weight: 600;
            color: var(--text-muted);
            background: #f9fafb;
            border: none;
            cursor: pointer;
            transition: 0.3s;
            position: relative;
        }

        .tab-btn.active {
            color: var(--primary);
            background: #fff;
        }

        .tab-btn.active::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 0;
            width: 100%;
            height: 3px;
            background: var(--primary);
        }

        /* Forms */
        .auth-forms {
            padding: 32px 40px;
        }

        .form-pane {
            display: none;
            animation: fadeIn 0.4s ease;
        }

        .form-pane.active {
            display: block;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 8px;
            color: #374151;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #9ca3af;
        }

        .form-control {
            width: 100%;
            padding: 14px 16px 14px 44px;
            border: 1px solid #d1d5db;
            border-radius: 10px;
            font-size: 15px;
            font-family: inherit;
            transition: 0.3s;
            box-sizing: border-box;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(225, 29, 72, 0.1);
        }

        /* Utils */
        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
            margin-bottom: 24px;
        }

        .forgot-link {
            color: var(--primary);
            text-decoration: none;
            font-weight: 500;
        }

        .forgot-link:hover {
            text-decoration: underline;
        }

        /* Buttons */
        .btn-submit {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-submit:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
        }

        /* Social Login */
        .social-divider {
            text-align: center;
            margin: 24px 0;
            position: relative;
        }

        .social-divider::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            width: 100%;
            height: 1px;
            background: var(--border);
            z-index: 1;
        }

        .social-divider span {
            position: relative;
            background: #fff;
            padding: 0 16px;
            color: var(--text-muted);
            font-size: 14px;
            z-index: 2;
        }

        .social-logins {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .btn-social {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 10px;
            background: #fff;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: 0.3s;
            color: var(--text-main);
        }

        .btn-social:hover {
            background: #f9fafb;
            border-color: #d1d5db;
        }

        .btn-social.google { color: #ea4335; }
        .btn-social.facebook { color: #1877f2; }

        .back-home {
            display: block;
            text-align: center;
            margin-top: 24px;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
        }

        .back-home:hover {
            color: var(--primary);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 480px) {
            .auth-forms { padding: 24px; }
            .social-logins { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div class="auth-container">
        <div class="logo-area">
            <a href="index.html">EIU COMPUTER</a>
        </div>

        <div class="auth-card">
            <div class="auth-tabs">
                <button class="tab-btn active" onclick="switchTab('login')">Đăng nhập</button>
                <button class="tab-btn" onclick="switchTab('register')">Đăng ký</button>
            </div>

            <div class="auth-forms">
                <form id="loginForm" class="form-pane active" onsubmit="handleLogin(event)">
                    <div class="form-group">
                        <label>Email của bạn</label>
                        <div class="input-wrapper">
                            <i class="fa-regular fa-envelope"></i>
                            <input type="email" class="form-control" placeholder="Nhập email" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Mật khẩu</label>
                        <div class="input-wrapper">
                            <i class="fa-solid fa-lock"></i>
                            <input type="password" class="form-control" placeholder="Nhập mật khẩu" required>
                        </div>
                    </div>

                    <div class="form-options">
                        <label style="display: flex; align-items: center; gap: 8px; cursor: pointer; margin: 0; font-weight: normal;">
                            <input type="checkbox"> Nhớ mật khẩu
                        </label>
                        <a href="#" class="forgot-link">Quên mật khẩu?</a>
                    </div>

                    <button type="submit" class="btn-submit">Đăng nhập</button>
                </form>

                <form id="registerForm" class="form-pane" onsubmit="handleRegister(event)">
                    <div class="form-group">
                        <label>Họ và Tên</label>
                        <div class="input-wrapper">
                            <i class="fa-regular fa-user"></i>
                            <input type="text" class="form-control" id="regName" placeholder="Nhập họ tên đầy đủ" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <div class="input-wrapper">
                            <i class="fa-regular fa-envelope"></i>
                            <input type="email" class="form-control" placeholder="Nhập email" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Mật khẩu</label>
                        <div class="input-wrapper">
                            <i class="fa-solid fa-lock"></i>
                            <input type="password" id="regPass" class="form-control" placeholder="Tạo mật khẩu (ít nhất 6 ký tự)" minlength="6" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Xác nhận mật khẩu</label>
                        <div class="input-wrapper">
                            <i class="fa-solid fa-shield-check"></i>
                            <input type="password" id="regPassConfirm" class="form-control" placeholder="Nhập lại mật khẩu" required>
                        </div>
                    </div>

                    <button type="submit" class="btn-submit">Đăng ký tài khoản</button>
                </form>

                <div class="social-divider">
                    <span>Hoặc đăng nhập bằng</span>
                </div>
                <div class="social-logins">
                    <button class="btn-social google">
                        <i class="fa-brands fa-google"></i> Google
                    </button>
                    <button class="btn-social facebook">
                        <i class="fa-brands fa-facebook-f"></i> Facebook
                    </button>
                </div>
            </div>
        </div>

        <a href="index.html" class="back-home"><i class="fa-solid fa-arrow-left"></i> Quay lại Trang chủ</a>
    </div>

    <script>
        function switchTab(tabName) {
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');

            document.querySelectorAll('.form-pane').forEach(form => {
                form.classList.remove('active');
            });
            document.getElementById(tabName + 'Form').classList.add('active');
        }

        function handleLogin(e) {
            e.preventDefault(); 
            
            localStorage.setItem('isLoggedIn', 'true');
            localStorage.setItem('userName', 'Nguyễn Gia Kiệt');

            alert('Đăng nhập thành công! Chào mừng quay trở lại.');
            
            window.location.href = 'account.html';
        }

        function handleRegister(e) {
            e.preventDefault();

            const pass = document.getElementById('regPass').value;
            const confirmPass = document.getElementById('regPassConfirm').value;
            const name = document.getElementById('regName').value;

            if(pass !== confirmPass) {
                alert('Mật khẩu xác nhận không khớp. Vui lòng kiểm tra lại!');
                return;
            }

            alert(`Đăng ký thành công tài khoản cho ${name}! Vui lòng đăng nhập.`);
            
            document.querySelectorAll('.tab-btn')[0].click();
            
            document.getElementById('registerForm').reset();
        }
    </script>
</body>
</html>
